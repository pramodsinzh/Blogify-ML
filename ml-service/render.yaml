# Optional Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: blogify-ml
    runtime: python
    rootDir: ml-service
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
